apiVersion: apps/v1
kind: Deployment
metadata:
  name: medilearn-deployment
  namespace: medilearn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medilearn
  template:
    metadata:
      labels:
        app: medilearn
    spec:
      containers:
      - name: medilearn
        image: <YOUR_DOCKER_IMAGE>
        ports:
        - containerPort: 3000
        env:
        - name: MONGODB_URI
          value: "<YOUR_MONGODB_URI>"
        - name: MONGODB_DB_NAME
          value: "<YOUR_DB_NAME>"
        - name: AUTH_JWT_SECRET
          value: "<YOUR_JWT_SECRET>"
        - name: GEMINI_API_KEY
          value: "<YOUR_GEMINI_API_KEY>"